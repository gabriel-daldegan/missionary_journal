  implementation_summary:
    - "Added `config/memory.php` and `MEMORY_MEDIA_DISK` to keep memory photo storage configurable, private by default on `local`, and S3-compatible through filesystem disk APIs."
    - "Configured `MemoryRecord` as a Spatie Media Library `HasMedia` model with a private `photos` collection, accepted JPEG/PNG/WebP mime types, and timeline photo counts derived from actual media."
    - "Added Livewire multi-photo upload state to `MemoryRecordEditor` for diary and period creation with `WithFileUploads`, `File::image()` validation, protected temporary previews, localized errors, and no persisted preview URLs."
    - "Extended `MemoryRecordService` to validate and attach photos through the service layer, enforce 25 photos per record, 10 MB per image, and the 2 GB workspace cap, and clean up partially attached media on attach failure."
    - "Added `MemoryMediaController`, `memories.media.show`, and `MemoryRecordPolicy::viewMedia()` so media UUIDs are re-scoped through the route tenant and parent record before streaming from private storage."
    - "Updated record detail to render attached photos only through authorized media routes and updated timeline loading to include media for real photo counts without public URLs or filenames."
    - "Added focused PHPUnit coverage for diary/period photo attachments, upload validation limits, service cap enforcement, route authorization, cross-tenant/non-member denial, no private content leakage, detail rendering, and timeline count behavior."

