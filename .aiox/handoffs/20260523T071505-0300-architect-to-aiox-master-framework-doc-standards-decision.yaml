  architecture_decision:
    decision: "Use docs/framework/*.md as the canonical lightweight Dev context layer."
    rationale:
      - ".aiox-core/core-config.yaml already declares frameworkDocsLocation as docs/framework and devLoadAlwaysFiles as docs/framework/coding-standards.md, tech-stack.md, and source-tree.md."
      - ".aiox-core/data/agent-config-requirements.yaml treats those three files as high-priority, non-lazy context for Dev and related agents."
      - "Loading full docs/architecture.md and docs/ui-architecture.md on every Dev activation would be heavier and would violate the intended lightweight Dev context boundary."
      - "The existing monolithic docs remain the richer architecture/product record; framework shards should summarize and point back to their source sections."
    rejected_alternative:
      option: "Point devLoadAlwaysFiles directly to docs/architecture.md and docs/ui-architecture.md."
      reason: "This would make Dev activation too broad and less stable, and it would diverge from the active frameworkDocsLocation and agent-config-requirements contracts."

  canonical_content_contract:
    docs/framework/tech-stack.md:
      purpose: "Concise runtime, framework, UI, build, testing, and local-development stack for implementation agents."
      required_sources:
        - "docs/ui-architecture.md#frontend-tech-stack"
        - "docs/architecture.md#existing-project-analysis"
        - "composer.json"
        - "package.json"
      required_content:
        - "Laravel 13, PHP 8.4, Livewire 4, Blade, Alpine.js 3, Tailwind CSS 4, DaisyUI 5, Filament 5, Vite 7."
        - "SaaSykit tenancy reuse, Spatie Media Library, Spatie Permission, PHPUnit 11, Larastan/PHPStan, Pint, Sail/Docker Compose."
        - "Explicit no-SPA, no client-side domain store, and no new frontend runtime unless a future architecture decision approves it."

    docs/framework/coding-standards.md:
      purpose: "Implementation rules Dev must load before touching stories."
      required_sources:
        - "docs/ui-architecture.md#critical-coding-rules"
        - "docs/ui-architecture.md#component-boundary-rules"
        - "docs/ui-architecture.md#tailwind-patterns"
        - "docs/architecture.md#architecture-decision-summary"
        - "AGENTS.md Laravel Boost guidelines from the workspace prompt"
      required_content:
        - "Use dedicated memory layout for memory routes."
        - "Keep Filament out of customer-facing memory workflows."
        - "Enforce tenant membership and policy/service scopes before rendering private content."
        - "Re-scope nested route-bound models to the route tenant."
        - "Use Livewire/Blade server-driven UI, Laravel named routes, translation keys, Form Requests where controllers validate, policies/gates for authorization, PHPUnit tests, and Pint for PHP formatting."
        - "Do not introduce album/admin-table/marketing-page framing for the memory product."

    docs/framework/source-tree.md:
      purpose: "Stable file ownership and expected locations for Dev and SM story traceability."
      required_sources:
        - "docs/ui-architecture.md#project-structure"
        - "docs/ui-architecture.md#primary-files-and-directories"
        - "docs/architecture.md#product-routing-and-ui-architecture"
      required_content:
        - "Existing Laravel/SaaSykit directories that remain reused: app/Models, app/Services, app/Policies, app/Filament, app/Livewire, resources/views, routes, tests."
        - "Memory route and UI locations: routes/web.php, app/Http/Middleware/EnsureTenantMember.php, app/Livewire/Memory, resources/views/components/layouts/memory.blade.php, resources/views/livewire/memory."
        - "Memory service, policy, translation, and test locations."
        - "A short governance note: docs/framework shards are Dev-context summaries derived from docs/architecture.md and docs/ui-architecture.md; update source docs and shards together when architecture changes."

  implementation_plan:
    owner: "@aiox-master"
    steps:
      - "Create docs/framework/ if missing."
      - "Create docs/framework/tech-stack.md, docs/framework/coding-standards.md, and docs/framework/source-tree.md from the required sources above."
      - "Keep each shard concise and implementation-focused; do not copy the full architecture documents."
      - "Keep .aiox-core/core-config.yaml devLoadAlwaysFiles pointing to docs/framework/*.md."
      - "Optionally revise devLoadAlwaysFilesFallback to useful live fallbacks only if the current Portuguese fallback files remain absent."
      - "Do not alter current Story 1.1 implementation files."
      - "After implementation, hand off to SM only if story source anchors need reconciliation."

  acceptance_criteria:
