    - "Dev activation no longer reports missing docs/framework/coding-standards.md, docs/framework/tech-stack.md, or docs/framework/source-tree.md."
    - "The shards preserve the brownfield Laravel/SaaSykit/Livewire/Blade/Tailwind/Filament decisions without adding product scope."
    - "The root architecture docs remain the richer source of architectural decisions."
    - "Current Story 1.1 implementation files are not mixed into this correction."

  verification_commands:
